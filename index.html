<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>★☆ Vibe Coding 專案追蹤站 ☆★</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #000080;
      background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='1' fill='%23ffffff' opacity='0.3'/%3E%3Ccircle cx='8' cy='12' r='0.5' fill='%23ffffff' opacity='0.2'/%3E%3Ccircle cx='14' cy='5' r='0.8' fill='%23ffffff' opacity='0.25'/%3E%3C/svg%3E");
      color: #00ff00;
      margin: 0;
      padding: 0;
    }
    a { color: #ffff00; }
    a:visited { color: #ff99ff; }
    a:hover { color: #ff0000; text-decoration: underline overline; }
    .page-wrapper { max-width: 900px; margin: 0 auto; padding: 10px; }

    .header {
      text-align: center;
      border: 3px ridge #c0c0c0;
      background: #000033;
      padding: 15px;
      margin-bottom: 10px;
    }
    .header h1 {
      font-size: 28px;
      color: #ff00ff;
      text-shadow: 2px 2px #000, 0 0 10px #ff00ff;
      margin: 0;
      letter-spacing: 2px;
    }
    .rainbow-text {
      font-size: 14px;
      font-weight: bold;
      animation: rainbow 2s linear infinite;
    }
    @keyframes rainbow {
      0% { color: #ff0000; } 16% { color: #ff8800; } 33% { color: #ffff00; }
      50% { color: #00ff00; } 66% { color: #0088ff; } 83% { color: #8800ff; } 100% { color: #ff0000; }
    }
    .marquee-bar {
      background: #ffff00; color: #ff0000; font-weight: bold; font-size: 13px;
      padding: 4px 0; overflow: hidden; white-space: nowrap; margin: 8px 0;
    }
    .marquee-inner { display: inline-block; animation: marquee 30s linear infinite; }
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    .controls {
      border: 3px ridge #c0c0c0; background: #000033; padding: 10px;
      margin-bottom: 10px; text-align: center;
    }
    .stats-row { display: flex; justify-content: center; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
    .stat-box { border: 2px ridge #c0c0c0; background: #000066; padding: 6px 16px; text-align: center; }
    .stat-box .num { font-size: 22px; font-family: "Courier New", monospace; font-weight: bold; color: #ffff00; }
    .stat-box .label { font-size: 10px; color: #00ccff; text-transform: uppercase; }
    .controls label { color: #00ffff; font-size: 12px; margin-right: 4px; }
    .controls input, .controls select {
      font-family: "Courier New", monospace; font-size: 12px;
      background: #fff; color: #000; border: 2px inset #c0c0c0; padding: 3px 6px; margin: 3px;
    }
    .controls input { width: 220px; }

    .section-title {
      color: #ff00ff; font-size: 16px; text-align: center;
      margin: 10px 0 5px; text-shadow: 1px 1px #000;
    }
    .divider {
      border: none; height: 4px;
      background: linear-gradient(90deg, #f00, #f80, #ff0, #0f0, #08f, #80f, #f00);
      margin: 8px 0;
    }

    .project-table {
      width: 100%; border-collapse: collapse;
      border: 3px ridge #c0c0c0; background: #000033; font-size: 12px;
    }
    .project-table th {
      background: #800080; color: #fff; padding: 6px 8px;
      border: 2px ridge #c0c0c0; font-size: 13px; text-align: left; white-space: nowrap;
    }
    .project-table td { padding: 6px 8px; border: 1px solid #339; vertical-align: top; }
    .project-table tr:nth-child(even) { background: #000055; }
    .project-table tr:nth-child(odd) { background: #000033; }
    .project-table tr:hover { background: #036; }

    .type-badge {
      display: inline-block; padding: 1px 8px; font-size: 10px;
      font-weight: bold; border: 1px outset #c0c0c0; text-transform: uppercase;
    }
    .type-app { background: #f00; color: #fff; }
    .type-web { background: #08f; color: #fff; }
    .type-line-bot { background: #0c0; color: #000; }
    .type-api { background: #f80; color: #000; }
    .type-other { background: #888; color: #fff; }

    .tag { display: inline-block; background: #339; color: #0ff; font-size: 10px; padding: 1px 5px; margin: 1px; border: 1px solid #66c; }
    .source-text { color: #f90; }
    .date-text { color: #aaa; font-family: "Courier New", monospace; }
    .empty-msg { text-align: center; padding: 30px; color: #f00; font-size: 16px; }

    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .under-construction { text-align: center; margin: 15px 0; font-size: 13px; color: #ff0; }
    .webring {
      text-align: center; border: 2px ridge #c0c0c0; background: #000033;
      padding: 8px; margin: 10px 0; font-size: 11px; color: #aaa;
    }
    footer {
      text-align: center; padding: 15px; font-size: 11px;
      color: #888; border-top: 2px ridge #c0c0c0; margin-top: 10px;
    }
    footer a { color: #0ff; }
    .cg { font-size: 20px; vertical-align: middle; }

    .github-corner svg { fill: #ff00ff; color: #000080; position: fixed; top: 0; right: 0; z-index: 999; }
    .github-corner:hover .octo-arm { animation: octocat-wave 560ms ease-in-out; }
    @keyframes octocat-wave {
      0%,100% { transform: rotate(0); }
      20%,60% { transform: rotate(-25deg); }
      40%,80% { transform: rotate(10deg); }
    }

    @media (max-width: 640px) {
      .header h1 { font-size: 20px; }
      .controls input { width: 150px; }
      .project-table, .project-table thead, .project-table tbody,
      .project-table th, .project-table td, .project-table tr {
        display: block;
      }
      .project-table thead { display: none; }
      .project-table tr {
        border: 2px ridge #c0c0c0;
        margin-bottom: 8px;
        padding: 6px;
      }
      .project-table td {
        padding: 4px 8px;
        border: none;
        border-bottom: 1px solid #333399;
        text-align: left;
      }
      .project-table td:before {
        content: attr(data-label);
        color: #ff00ff;
        font-weight: bold;
        display: block;
        font-size: 10px;
        margin-bottom: 2px;
      }
    }
  </style>
</head>
<body>
  <a href="https://github.com/MTsung/vibe_coding_tracker" target="_blank" rel="noopener noreferrer" class="github-corner" aria-label="View on GitHub">
    <svg width="80" height="80" viewBox="0 0 250 250" aria-hidden="true">
      <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
      <path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style="transform-origin:130px 106px;" class="octo-arm"></path>
      <path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor"></path>
    </svg>
  </a>
  <div class="page-wrapper">
    <div class="header">
      <h1>★☆ Vibe Coding 專案追蹤站 ☆★</h1>
      <div class="rainbow-text">～追蹤各種用 AI 做出來的酷東西～</div>
      <div class="marquee-bar" role="marquee">
        <div class="marquee-inner">★★★ 歡迎來到 Vibe Coding 專案追蹤站！！收集各種用 AI vibe coding 完成的專案！！APP、WEB、LINE BOT 通通有！！★★★</div>
      </div>
      <div class="stats-row">
        <div class="stat-box"><div class="num" id="totalCount">0</div><div class="label">總共</div></div>
        <div class="stat-box"><div class="num" id="aliveCount" style="color:#0f0;">0</div><div class="label">存活</div></div>
        <div class="stat-box"><div class="num" id="deadCount" style="color:#f00;">0</div><div class="label">死亡</div></div>
      </div>
    </div>

    <div class="controls">
      <div style="margin-bottom:6px;">
        <label for="search">🔍搜尋：</label>
        <input type="text" id="search" placeholder="輸入關鍵字..." aria-label="搜尋專案">
      </div>
      <div>
        <label for="typeFilter">類型：</label>
        <select id="typeFilter" aria-label="依類型篩選"><option value="">-- 全部 --</option></select>
        <label for="sourceFilter">來源：</label>
        <select id="sourceFilter" aria-label="依來源篩選"><option value="">-- 全部 --</option></select>
        <label for="sortBy">排序：</label>
        <select id="sortBy" aria-label="排序方式">
          <option value="date-desc">最新優先</option>
          <option value="date-asc">最舊優先</option>
          <option value="name-asc">名稱 A→Z</option>
        </select>
        <label for="statusFilter">狀態：</label>
        <select id="statusFilter" aria-label="依狀態篩選">
          <option value="">-- 全部 --</option>
          <option value="alive">🟢 存活中</option>
          <option value="dead">💀 已死亡</option>
        </select>
      </div>
    </div>

    <hr class="divider">

    <div id="tableContainer"></div>

    <hr class="divider">

    <div class="under-construction">
      <span class="cg">🏗️</span> <span class="blink">★ 持續更新中 ★</span> <span class="cg">🏗️</span>
      <br>最後更新：<span class="date-text" id="lastUpdate">--</span>
    </div>

  </div>

  <script>
    var projects = [];

    function typeClass(type) {
      var key = type.toLowerCase().replace(/\s+/g, '-');
      var map = { app:'type-app', web:'type-web', 'line-bot':'type-line-bot', api:'type-api' };
      return map[key] || 'type-other';
    }

    function renderTable(data) {
      var c = document.getElementById('tableContainer');
      if (!data.length) { c.innerHTML = '<div class="empty-msg">☹ 找不到符合條件的專案... 請換個關鍵字試試 ☹</div>'; return; }
      var h = '<table class="project-table"><thead><tr><th>專案名稱</th><th>類型</th><th>說明</th><th>標籤</th><th>來源</th><th>日期</th><th>💀 狀態</th><th>⏳ 壽命</th></tr></thead><tbody>';
      data.forEach(function(p, i) {
        var tags = (p.tags||[]).map(function(t){return '<span class="tag">#'+t+'</span>';}).join(' ');
        var srcHtml = p.sourceUrl ? '<a href="'+p.sourceUrl+'" target="_blank" rel="noopener noreferrer">'+p.source+'</a>' : p.source;
        var deadHtml;
        var lifeHtml;
        if (p.deadDate) {
          var days = Math.floor((new Date(p.deadDate) - new Date(p.date)) / 86400000);
          deadHtml = '<span style="color:#f00;cursor:help;" title="死亡日期：'+p.deadDate+'">💀 死亡</span>';
          lifeHtml = '<span style="color:#f88;">'+days+' 天</span>';
        } else {
          var alive = Math.floor((new Date() - new Date(p.date)) / 86400000);
          deadHtml = '<span style="color:#0f0;">存活中</span>';
          lifeHtml = '<span style="color:#0f0;">'+alive+' 天</span>';
        }
        var rowStyle = p.deadDate ? ' style="opacity:0.75;"' : '';
        h += '<tr'+rowStyle+'>';
        h += '<td data-label="專案名稱"><a href="'+p.url+'" target="_blank" rel="noopener noreferrer">'+p.name+'</a></td>';
        h += '<td data-label="類型"><span class="type-badge '+typeClass(p.type)+'">'+p.type+'</span></td>';
        h += '<td data-label="說明" style="color:#ccc;">'+p.description+'</td>';
        h += '<td data-label="標籤">'+tags+'</td>';
        h += '<td data-label="來源" class="source-text">'+srcHtml+'</td>';
        h += '<td data-label="日期" class="date-text">'+p.date+'</td>';
        h += '<td data-label="💀 狀態" class="date-text">'+deadHtml+'</td>';
        h += '<td data-label="⏳ 壽命" class="date-text">'+lifeHtml+'</td></tr>';
      });
      h += '</tbody></table>';
      c.innerHTML = h;
    }

    function getFiltered() {
      var q = document.getElementById('search').value.toLowerCase();
      var type = document.getElementById('typeFilter').value;
      var source = document.getElementById('sourceFilter').value;
      var sort = document.getElementById('sortBy').value;
      var status = document.getElementById('statusFilter').value;
      var filtered = projects.filter(function(p) {
        var mq = !q || p.name.toLowerCase().indexOf(q)>=0 || p.description.toLowerCase().indexOf(q)>=0
          || (p.tags||[]).some(function(t){return t.toLowerCase().indexOf(q)>=0;});
        var matchStatus = !status || (status==='dead' ? !!p.deadDate : !p.deadDate);
        return mq && (!type || p.type===type) && (!source || p.source===source) && matchStatus;
      });
      filtered.sort(function(a,b) {
        if (sort==='date-desc') return b.date.localeCompare(a.date);
        if (sort==='date-asc') return a.date.localeCompare(b.date);
        return a.name.localeCompare(b.name);
      });
      return filtered;
    }

    function update() { renderTable(getFiltered()); }

    function populateFilters() {
      var types = []; var sources = [];
      projects.forEach(function(p) {
        if (types.indexOf(p.type)<0) types.push(p.type);
        if (sources.indexOf(p.source)<0) sources.push(p.source);
      });
      types.sort(); sources.sort();
      var tf = document.getElementById('typeFilter');
      types.forEach(function(t){var o=document.createElement('option');o.value=t;o.textContent=t;tf.appendChild(o);});
      var sf = document.getElementById('sourceFilter');
      sources.forEach(function(s){var o=document.createElement('option');o.value=s;o.textContent=s;sf.appendChild(o);});
      var dead = projects.filter(function(p){return !!p.deadDate;}).length;
      document.getElementById('totalCount').textContent = projects.length;
      document.getElementById('aliveCount').textContent = projects.length - dead;
      document.getElementById('deadCount').textContent = dead;
      var dates = projects.map(function(p){return p.date;}).sort();
      if (dates.length) document.getElementById('lastUpdate').textContent = dates[dates.length-1];
    }

    document.getElementById('search').addEventListener('input', update);
    document.getElementById('typeFilter').addEventListener('change', update);
    document.getElementById('sourceFilter').addEventListener('change', update);
    document.getElementById('sortBy').addEventListener('change', update);
    document.getElementById('statusFilter').addEventListener('change', update);

    fetch('data.json?t=' + Date.now()).then(function(r){return r.json();}).then(function(data){
      projects = data; populateFilters(); update();
    }).catch(function(){
      document.getElementById('tableContainer').innerHTML = '<div class="empty-msg">☹ 無法載入 data.json ☹</div>';
    });
  </script>
</body>
</html>
